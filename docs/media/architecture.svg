<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="600" rx="14" fill="#0d1117"/>
  <text x="36" y="44" fill="#e6edf3" font-size="22" font-weight="700">How it's built — three layers, all on your machine</text>
  <text x="36" y="68" fill="#8b949e" font-size="13.5">Capture flows down. Recall flows back up — automatically, on every prompt. No cloud, no API key.</text>

  <!-- arrows: capture (left, down) and recall (right, up) -->
  <defs>
    <marker id="ad" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/></marker>
    <marker id="au" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3fb950"/></marker>
  </defs>

  <!-- LAYER 1: YOU -->
  <rect x="36" y="92" width="828" height="96" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="56" y="120" fill="#79c0ff" font-size="13" font-weight="700">YOU · in any project</text>
  <rect x="56" y="132" width="232" height="40" rx="7" fill="#0d1117" stroke="#30363d"/>
  <text x="172" y="157" fill="#e6edf3" font-size="13" text-anchor="middle">A prompt to Claude Code</text>
  <rect x="304" y="132" width="248" height="40" rx="7" fill="#0d1117" stroke="#30363d"/>
  <text x="428" y="157" fill="#adbac7" font-size="12.5" text-anchor="middle">capture: /save · /lesson · /idea</text>
  <rect x="568" y="132" width="276" height="40" rx="7" fill="#0d1117" stroke="#30363d"/>
  <text x="706" y="157" fill="#adbac7" font-size="12.5" text-anchor="middle">review: /os · /lessons-gc · /resume</text>

  <!-- LAYER 2: INTEGRATION -->
  <rect x="36" y="220" width="828" height="104" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="56" y="246" fill="#d2a8ff" font-size="13" font-weight="700">CLAUDE CODE INTEGRATION · the active layer (~/.claude)</text>
  <rect x="56" y="258" width="250" height="52" rx="7" fill="#1d1b2e" stroke="#6e5494"/>
  <text x="181" y="278" fill="#d2a8ff" font-size="12.5" text-anchor="middle" font-weight="700">recall-lessons.py</text>
  <text x="181" y="296" fill="#8b949e" font-size="11" text-anchor="middle">UserPromptSubmit · every prompt</text>
  <rect x="322" y="258" width="250" height="52" rx="7" fill="#2a1b1e" stroke="#a5484c"/>
  <text x="447" y="278" fill="#ff9a9a" font-size="12.5" text-anchor="middle" font-weight="700">risk-recall.py</text>
  <text x="447" y="296" fill="#8b949e" font-size="11" text-anchor="middle">PreToolUse · before risky actions</text>
  <rect x="588" y="258" width="256" height="52" rx="7" fill="#0d1117" stroke="#30363d"/>
  <text x="716" y="278" fill="#e6edf3" font-size="12.5" text-anchor="middle">commands + os_lessons engine</text>
  <text x="716" y="296" fill="#8b949e" font-size="11" text-anchor="middle">+ fire-log (what fired, when)</text>

  <!-- LAYER 3: VAULT -->
  <rect x="36" y="356" width="828" height="96" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="56" y="382" fill="#7ee787" font-size="13" font-weight="700">YOUR VAULT · plain markdown you own (~/vault) — no database, no lock-in</text>
  <g font-size="12" text-anchor="middle">
    <rect x="56" y="396" width="118" height="40" rx="7" fill="#0d1117" stroke="#30363d"/><text x="115" y="421" fill="#e6edf3">lessons/</text>
    <rect x="184" y="396" width="118" height="40" rx="7" fill="#0d1117" stroke="#30363d"/><text x="243" y="421" fill="#e6edf3">knowledge/</text>
    <rect x="312" y="396" width="108" height="40" rx="7" fill="#0d1117" stroke="#30363d"/><text x="366" y="421" fill="#e6edf3">ideas/</text>
    <rect x="430" y="396" width="118" height="40" rx="7" fill="#0d1117" stroke="#30363d"/><text x="489" y="421" fill="#e6edf3">projects/</text>
    <rect x="558" y="396" width="100" height="40" rx="7" fill="#0d1117" stroke="#30363d"/><text x="608" y="421" fill="#e6edf3">logs/</text>
    <rect x="668" y="396" width="118" height="40" rx="7" fill="#0d1117" stroke="#30363d"/><text x="727" y="421" fill="#e6edf3">profile/</text>
  </g>

  <!-- LAYER 4: ENGINES -->
  <rect x="36" y="484" width="828" height="92" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="56" y="510" fill="#ffa657" font-size="13" font-weight="700">LOCAL ENGINES · $0, no API key, nothing leaves the machine</text>
  <rect x="56" y="522" width="250" height="42" rx="7" fill="#0d1117" stroke="#30363d"/>
  <text x="181" y="548" fill="#e6edf3" font-size="12.5" text-anchor="middle">qmd — semantic search (meaning)</text>
  <rect x="322" y="522" width="250" height="42" rx="7" fill="#0d1117" stroke="#30363d"/>
  <text x="447" y="548" fill="#e6edf3" font-size="12.5" text-anchor="middle">graphify — knowledge graph (structure)</text>
  <rect x="588" y="522" width="256" height="42" rx="7" fill="#0d1117" stroke="#30363d"/>
  <text x="716" y="548" fill="#adbac7" font-size="12.5" text-anchor="middle">ollama — dedup (optional)</text>

  <!-- capture arrow (down, left edge) -->
  <line x1="24" y1="140" x2="24" y2="404" stroke="#58a6ff" stroke-width="2" marker-end="url(#ad)"/>
  <text x="20" y="300" fill="#58a6ff" font-size="11" transform="rotate(-90 20 300)" text-anchor="middle">① capture → written to the vault</text>

  <!-- recall arrow (up, right edge) -->
  <line x1="876" y1="528" x2="876" y2="180" stroke="#3fb950" stroke-width="2" marker-end="url(#au)"/>
  <text x="892" y="354" fill="#3fb950" font-size="11" transform="rotate(90 892 354)" text-anchor="middle">③ recall ← injected into your prompt</text>

  <!-- index link vault<->engines -->
  <text x="450" y="472" fill="#8b949e" font-size="11" text-anchor="middle">② engines index the vault locally  ↕</text>
</svg>
