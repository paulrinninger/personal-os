<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 372" width="720" height="372" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13.5">
  <rect x="0" y="0" width="720" height="372" rx="10" fill="#0d1117"/>
  <rect x="0" y="0" width="720" height="34" rx="10" fill="#161b22"/>
  <rect x="0" y="24" width="720" height="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="5.5" fill="#ff5f56"/>
  <circle cx="38" cy="17" r="5.5" fill="#ffbd2e"/>
  <circle cx="56" cy="17" r="5.5" fill="#27c93f"/>
  <text x="360" y="21" text-anchor="middle" fill="#8b949e" font-size="12">Claude Code — recall on every prompt</text>

  <!-- user prompt -->
  <text x="22" y="62" fill="#58a6ff">&#8250;</text>
  <text x="40" y="62" fill="#e6edf3">help me git push --force to clean up these old branches</text>

  <!-- injected context block -->
  <rect x="16" y="80" width="688" height="116" rx="6" fill="#1d2412" stroke="#d29922" stroke-width="1"/>
  <rect x="16" y="80" width="4" height="116" rx="2" fill="#d29922"/>
  <text x="32" y="102" fill="#f0b72f" font-size="11.5">&#10227; UserPromptSubmit hook · recall-lessons.py · qmd vsearch ($0, local)</text>
  <text x="32" y="126" fill="#e3b341">VAULT LESSONS (auto-match) — read &amp; apply BEFORE you act:</text>
  <text x="32" y="150" fill="#ffa657">&#8226; ~/vault/lessons/never-force-push-a-shared-branch.md  <tspan fill="#f0b72f">(85%)</tspan></text>
  <text x="32" y="174" fill="#8b949e">&#8627; Never force-push a branch others may have pulled.</text>

  <!-- claude reply -->
  <text x="22" y="228" fill="#a371f7">&#9670;</text>
  <text x="40" y="228" fill="#adbac7">Hold on — there's a documented lesson on exactly this. On a</text>
  <text x="40" y="251" fill="#adbac7">shared branch, don't <tspan fill="#79c0ff">--force</tspan>; it overwrites teammates' commits.</text>
  <text x="40" y="274" fill="#adbac7">Use <tspan fill="#79c0ff">--force-with-lease</tspan> on your own branch, or <tspan fill="#79c0ff">git revert</tspan>.</text>
  <text x="40" y="297" fill="#adbac7">Want me to do that instead?</text>

  <text x="22" y="344" fill="#6e7681" font-size="11">Illustrative still of the actual injected context. Animated capture: docs/media/recall-hook.tape</text>
</svg>
