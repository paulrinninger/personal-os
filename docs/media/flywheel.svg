<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="620" rx="14" fill="#0d1117"/>
  <text x="36" y="44" fill="#e6edf3" font-size="22" font-weight="700">The flywheel — it gets sharper the more you use it</text>
  <text x="36" y="68" fill="#8b949e" font-size="13.5">Most note systems only fill up. This one measures what helps and prunes what doesn't, so recall stays sharp.</text>

  <!-- guide ring + clockwise arrowheads -->
  <circle cx="450" cy="330" r="180" fill="none" stroke="#30363d" stroke-dasharray="3 7"/>
  <g fill="#58a6ff">
    <path d="M-6,-5 L6,0 L-6,5 Z" transform="translate(540,174) rotate(30)"/>
    <path d="M-6,-5 L6,0 L-6,5 Z" transform="translate(630,330) rotate(90)"/>
    <path d="M-6,-5 L6,0 L-6,5 Z" transform="translate(540,486) rotate(150)"/>
    <path d="M-6,-5 L6,0 L-6,5 Z" transform="translate(360,486) rotate(210)"/>
    <path d="M-6,-5 L6,0 L-6,5 Z" transform="translate(270,330) rotate(270)"/>
    <path d="M-6,-5 L6,0 L-6,5 Z" transform="translate(360,174) rotate(330)"/>
  </g>

  <!-- center -->
  <text x="450" y="322" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">Self-sharpening</text>
  <text x="450" y="344" fill="#8b949e" font-size="12.5" text-anchor="middle">memory</text>

  <!-- nodes: Capture(450,150) Index(606,240) Recall(606,420) Apply(450,510) Measure(294,420) Prune(294,240) -->
  <g text-anchor="middle">
    <rect x="362" y="120" width="176" height="58" rx="9" fill="#161b22" stroke="#3fb950"/>
    <text x="450" y="144" fill="#7ee787" font-size="13.5" font-weight="700">1 · Capture</text>
    <text x="450" y="163" fill="#8b949e" font-size="11.5">/save · /lesson · /idea</text>

    <rect x="518" y="211" width="186" height="58" rx="9" fill="#161b22" stroke="#ffa657"/>
    <text x="611" y="235" fill="#ffa657" font-size="13.5" font-weight="700">2 · Index</text>
    <text x="611" y="254" fill="#8b949e" font-size="11.5">qmd embeds it · local · $0</text>

    <rect x="518" y="391" width="186" height="58" rx="9" fill="#161b22" stroke="#d2a8ff"/>
    <text x="611" y="415" fill="#d2a8ff" font-size="13.5" font-weight="700">3 · Recall</text>
    <text x="611" y="434" fill="#8b949e" font-size="11.5">auto-injected, every prompt</text>

    <rect x="362" y="481" width="176" height="58" rx="9" fill="#161b22" stroke="#79c0ff"/>
    <text x="450" y="505" fill="#79c0ff" font-size="13.5" font-weight="700">4 · Apply</text>
    <text x="450" y="524" fill="#8b949e" font-size="11.5">Claude avoids the mistake</text>

    <rect x="196" y="391" width="196" height="58" rx="9" fill="#161b22" stroke="#58a6ff"/>
    <text x="294" y="415" fill="#58a6ff" font-size="13.5" font-weight="700">5 · Measure</text>
    <text x="294" y="434" fill="#8b949e" font-size="11.5">fire-log: what actually fired</text>

    <rect x="196" y="211" width="196" height="58" rx="9" fill="#161b22" stroke="#f0883e"/>
    <text x="294" y="235" fill="#f0883e" font-size="13.5" font-weight="700">6 · Prune</text>
    <text x="294" y="254" fill="#8b949e" font-size="11.5">/lessons-gc drops dead weight</text>
  </g>

  <text x="450" y="588" fill="#6e7681" font-size="12" text-anchor="middle">A lesson earns its place only if it fires. Never fired → archived. Fired often → sharpened. Contradictory → merged.</text>
</svg>
