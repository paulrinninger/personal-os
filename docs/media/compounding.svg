<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="560" rx="14" fill="#0d1117"/>
  <text x="36" y="44" fill="#e6edf3" font-size="22" font-weight="700">What it compounds into over time</text>
  <text x="36" y="68" fill="#8b949e" font-size="13.5">Stateless AI starts from zero every session. Personal OS keeps — and instantly recalls — everything you've learned.</text>

  <!-- legend -->
  <rect x="540" y="92" width="14" height="14" rx="3" fill="#3fb950"/>
  <text x="560" y="104" fill="#adbac7" font-size="12.5">Personal OS — compounding, recalled memory</text>
  <rect x="540" y="114" width="14" height="14" rx="3" fill="#6e7681"/>
  <text x="560" y="126" fill="#adbac7" font-size="12.5">Stateless AI — resets every session</text>

  <!-- axes -->
  <line x1="90" y1="470" x2="850" y2="470" stroke="#30363d"/>
  <line x1="90" y1="110" x2="90" y2="470" stroke="#30363d"/>
  <text x="60" y="295" fill="#8b949e" font-size="12" transform="rotate(-90 60 295)" text-anchor="middle">useful knowledge, instantly recalled →</text>

  <!-- gridlines -->
  <g stroke="#161b22"><line x1="90" y1="400" x2="850" y2="400"/><line x1="90" y1="320" x2="850" y2="320"/><line x1="90" y1="240" x2="850" y2="240"/><line x1="90" y1="160" x2="850" y2="160"/></g>

  <!-- x ticks -->
  <g fill="#8b949e" font-size="12" text-anchor="middle">
    <text x="120" y="492">Week 1</text>
    <text x="260" y="492">Month 1</text>
    <text x="400" y="492">Month 3</text>
    <text x="540" y="492">Month 6</text>
    <text x="680" y="492">Month 9</text>
    <text x="820" y="492">Month 12</text>
  </g>

  <!-- Personal OS area + curve -->
  <path d="M120,460 L120,430 L260,380 L400,300 L540,210 L680,160 L820,130 L820,470 L120,470 Z" fill="#3fb950" fill-opacity="0.13"/>
  <polyline points="120,430 260,380 400,300 540,210 680,160 820,130" fill="none" stroke="#3fb950" stroke-width="3"/>
  <g fill="#3fb950"><circle cx="120" cy="430" r="4"/><circle cx="260" cy="380" r="4"/><circle cx="400" cy="300" r="4"/><circle cx="540" cy="210" r="4"/><circle cx="680" cy="160" r="4"/><circle cx="820" cy="130" r="5"/></g>

  <!-- Stateless flat line -->
  <polyline points="120,443 260,446 400,440 540,447 680,441 820,445" fill="none" stroke="#6e7681" stroke-width="2.5" stroke-dasharray="6 5"/>

  <!-- annotations -->
  <text x="128" y="418" fill="#7ee787" font-size="11.5">first lessons captured</text>
  <text x="408" y="288" fill="#7ee787" font-size="11.5">recall fires daily — repeats stop</text>
  <text x="430" y="200" fill="#7ee787" font-size="11.5">cross-project patterns surface on their own</text>
  <rect x="612" y="86" width="236" height="40" rx="8" fill="#0d1117" stroke="#3fb950" opacity="0"/>
  <text x="724" y="120" fill="#7ee787" font-size="12.5" text-anchor="middle" font-weight="700">like a teammate who remembers</text>
  <text x="724" y="138" fill="#7ee787" font-size="12.5" text-anchor="middle" font-weight="700">everything you've ever learned</text>

  <text x="470" y="528" fill="#6e7681" font-size="12" text-anchor="middle">The curve is the point: value accrues because every captured lesson is recalled automatically, forever, at $0.</text>
</svg>
